<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Station Performance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;overflow-x:hidden;transition:background .4s,color .4s;padding-bottom:80px}
body.light{background:#f5f5f2;color:#111}
a{text-decoration:none;color:inherit}

.theme-toggle{position:fixed;top:16px;right:20px;z-index:90;background:rgba(255,255,255,0.08);border:1px solid #333;color:#888;padding:8px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;transition:all .3s}
.theme-toggle:hover{border-color:#FC4C02;color:#FC4C02}
body.light .theme-toggle{background:rgba(0,0,0,0.05);border-color:#ccc;color:#666}

.glow{position:fixed;width:300px;height:300px;background:#FC4C02;filter:blur(150px);opacity:0.1;border-radius:50%;pointer-events:none;z-index:0}
.glow-1{top:5%;left:50%}

.container{max-width:900px;margin:0 auto;padding:60px 20px;position:relative;z-index:1}
.page-header{margin-bottom:40px}
.page-title{font-size:36px;font-weight:900;letter-spacing:-2px;margin-bottom:4px}
.page-sub{font-size:13px;color:#888}
.back-link{font-size:12px;color:#888;margin-bottom:16px;display:inline-block;transition:color .2s}
.back-link:hover{color:#FC4C02}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}
.stat-card{background:#161616;border:1px solid #333;border-radius:20px;padding:24px;text-align:center;transition:all .3s}
.stat-card:hover{border-color:#FC4C02;transform:translateY(-4px)}
body.light .stat-card{background:#fff;border-color:#e0e0e0}
.stat-val{font-size:28px;font-weight:900;letter-spacing:-1px}
.stat-lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-top:4px}

.section-title{font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:16px;margin-top:40px}

.chart-container{background:#161616;border:1px solid #333;border-radius:30px;padding:32px;margin-bottom:32px;overflow:hidden}
body.light .chart-container{background:#fff;border-color:#e0e0e0}
.chart-title{font-size:16px;font-weight:700;margin-bottom:20px}
.chart{display:flex;align-items:flex-end;gap:10px;height:200px;padding-top:24px}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.chart-bar{width:100%;min-width:20px;border-radius:8px 8px 4px 4px;background:linear-gradient(to top,#FC4C02,#ff7a3d);transition:all .6s ease;min-height:6px;position:relative}
.chart-bar:hover{filter:brightness(1.2);transform:scaleY(1.03)}
.chart-bar-val{font-size:10px;font-weight:700;color:#fff;position:absolute;top:-20px;left:50%;transform:translateX(-50%);white-space:nowrap}
.chart-label{font-size:9px;color:#888;text-align:center;margin-top:2px}

.session-list{display:flex;flex-direction:column;gap:8px}
.session-card{background:#161616;border:1px solid #333;border-radius:20px;padding:20px 24px;cursor:pointer;transition:all .3s}
.session-card:hover{border-color:#FC4C02;transform:translateY(-4px);box-shadow:0 12px 30px rgba(252,76,2,0.15)}
body.light .session-card{background:#fff;border-color:#e0e0e0}
.session-top{display:flex;justify-content:space-between;align-items:center}
.session-name{font-size:15px;font-weight:700}
.session-date{font-size:12px;color:#888}
.session-stats{display:flex;gap:20px;margin-top:10px;flex-wrap:wrap}
.session-stat{font-size:12px;color:#aaa}
.session-stat span{color:#fff;font-weight:600}
body.light .session-stat span{color:#111}
.type-badge{display:inline-block;font-size:10px;font-weight:600;padding:3px 10px;border-radius:10px;margin-left:10px}
.type-easy{background:rgba(34,197,94,0.15);color:#22c55e}
.type-interval{background:rgba(252,76,2,0.15);color:#FC4C02}
.type-threshold{background:rgba(234,179,8,0.15);color:#eab308}
.type-long{background:rgba(99,102,241,0.15);color:#6366f1}

.session-detail{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s;padding:0 0}
.session-detail.open{max-height:400px;padding:16px 0 0}
.splits{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:6px}
.split{background:#222;border-radius:10px;padding:8px;text-align:center;font-size:11px}
body.light .split{background:#f0f0ed}
.split-km{font-size:9px;color:#888}
.split-val{font-weight:700;font-size:13px;margin-top:2px}

.ai-btn{display:block;width:100%;margin-top:32px;padding:16px;border-radius:20px;border:1px solid #FC4C02;background:transparent;color:#FC4C02;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .3s;letter-spacing:.5px}
.ai-btn:hover{background:#FC4C02;color:#fff}
.ai-result{margin-top:16px;background:#161616;border:1px solid #333;border-radius:20px;padding:24px;font-size:13px;line-height:1.7;color:#ccc;display:none}
body.light .ai-result{background:#fff;border-color:#e0e0e0;color:#444}
.ai-result.show{display:block;animation:fadeUp .5s ease}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.mobile-nav{position:fixed;bottom:0;left:0;right:0;z-index:90;background:#111;border-top:1px solid #222;padding:8px 0 env(safe-area-inset-bottom,8px)}
body.light .mobile-nav{background:#fff;border-color:#e0e0e0}
.mobile-nav-inner{display:flex;justify-content:space-around;max-width:400px;margin:0 auto}
.mob-link{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:#888;padding:6px 12px;border-radius:12px;transition:color .2s}
.mob-link.active,.mob-link:hover{color:#FC4C02}
.mob-icon{font-size:18px}

@media(max-width:600px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .stat-val{font-size:22px}
}
</style>
</head>
<body>
<div class="glow glow-1"></div>
<button class="theme-toggle" onclick="toggleTheme()">&#9728;&#65039; Theme</button>

<div class="container">
  <a href="index.html" class="back-link">&larr; Accueil</a>
  <div class="page-header">
    <h1 class="page-title">Dashboard</h1>
    <p class="page-sub">Suivi des seances et charge d'entrainement</p>
  </div>

  <div class="stats-row" id="weekStats"></div>

  <p class="section-title">Charge hebdomadaire (km)</p>
  <div class="chart-container">
    <div class="chart" id="chart"></div>
  </div>

  <p class="section-title">Seances recentes</p>
  <div class="session-list" id="sessionList"></div>

  <button class="ai-btn" onclick="showAnalysis()">&#129302; Analyser avec l'IA</button>
  <div class="ai-result" id="aiResult"></div>
</div>

<nav class="mobile-nav">
  <div class="mobile-nav-inner">
    <a href="index.html" class="mob-link"><span class="mob-icon">&#127968;</span><span class="mob-label">Accueil</span></a>
    <a href="dashboard.html" class="mob-link active"><span class="mob-icon">&#128200;</span><span class="mob-label">Dashboard</span></a>
    <a href="profil.html" class="mob-link"><span class="mob-icon">&#128100;</span><span class="mob-label">Profil</span></a>
  </div>
</nav>

<script>

// Week stats
const now=new Date('2026-06-25');
const weekStart=new Date('2026-06-22');weekStart.setHours(0,0,0,0);
const weekEnd=new Date('2026-06-28');weekEnd.setHours(23,59,59);
const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
const thisWeek=SESSIONS.filter(a=>new Date(a.date)>=weekStart&&new Date(a.date)<=weekEnd);
const thisMonth=SESSIONS.filter(a=>new Date(a.date)>=monthStart&&new Date(a.date)<=now);

function avgPace(acts){
  if(!acts.length)return'-';
  const p=acts.map(a=>{const s=a.pace.split(':');return+s[0]+ +s[1]/60});
  const avg=p.reduce((s,v)=>s+v,0)/p.length;
  const m=Math.floor(avg),sec=Math.round((avg-m)*60);
  return m+':'+(sec<10?'0'+sec:sec);
}

document.getElementById('weekStats').innerHTML=[
  {v:thisWeek.reduce((s,a)=>s+a.distance,0).toFixed(1),l:'km cette semaine'},
  {v:thisMonth.reduce((s,a)=>s+a.distance,0).toFixed(0),l:'km ce mois'},
  {v:thisWeek.length,l:'seances semaine'},
  {v:avgPace(thisMonth),l:'allure moy. mois'},
].map(s=>`<div class="stat-card"><div class="stat-val">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join('');

// Weekly chart
const weeks={};
SESSIONS.forEach(s=>{
  const d=new Date(s.date);
  const day=d.getDay();
  const diff=day===0?6:day-1;
  const w=new Date(d);w.setDate(d.getDate()-diff);
  const key=w.toISOString().split('T')[0];
  weeks[key]=(weeks[key]||0)+s.distance;
});
const wKeys=Object.keys(weeks).sort().slice(-10);
const maxKm=Math.max(...wKeys.map(k=>weeks[k]));
const chartEl=document.getElementById('chart');
const maxBarHeight=160;
wKeys.forEach(k=>{
  const km=weeks[k];
  const h=Math.max(6,Math.round((km/maxKm)*maxBarHeight));
  const d=new Date(k);
  const label=(d.getDate())+'/'+(d.getMonth()+1);
  chartEl.innerHTML+=`<div class="chart-bar-wrap"><div class="chart-bar" style="height:${h}px"><span class="chart-bar-val">${Math.round(km)}</span></div><div class="chart-label">${label}</div></div>`;
});

// Session list (last 15)
const recent=SESSIONS.slice().reverse().slice(0,15);
const list=document.getElementById('sessionList');
recent.forEach((s,i)=>{
  const d=new Date(s.date);
  const dateStr=d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
  const typeClass='type-'+s.type;
  const typeName={easy:'EF',interval:'Fractionne',threshold:'Seuil',long:'Long'}[s.type]||s.type;
  // Generate fake splits
  const nbKm=Math.floor(s.distance);
  const basePace=s.pace.split(':');
  const baseMin=+basePace[0]+ +basePace[1]/60;
  let splits='';
  for(let k=1;k<=nbKm;k++){
    const variation=(Math.random()-0.5)*0.3;
    const p=baseMin+variation;
    const m=Math.floor(p),sec=Math.round((p-m)*60);
    splits+=`<div class="split"><div class="split-km">km ${k}</div><div class="split-val">${m}:${sec<10?'0'+sec:sec}</div></div>`;
  }
  list.innerHTML+=`
    <div class="session-card" onclick="this.querySelector('.session-detail').classList.toggle('open')">
      <div class="session-top">
        <div><span class="session-name">${s.name}</span><span class="type-badge ${typeClass}">${typeName}</span></div>
        <span class="session-date">${dateStr}</span>
      </div>
      <div class="session-stats">
        <div class="session-stat"><span>${s.distance} km</span></div>
        <div class="session-stat"><span>${s.duration}</span></div>
        <div class="session-stat"><span>${s.pace}/km</span></div>
        <div class="session-stat">D+ <span>${s.elev}m</span></div>
        <div class="session-stat">FC <span>${s.fc} bpm</span></div>
      </div>
      <div class="session-detail"><div class="splits">${splits}</div></div>
    </div>`;
});

// AI analysis
function showAnalysis(){
  const el=document.getElementById('aiResult');
  el.classList.add('show');
  el.innerHTML=`<strong style="color:#FC4C02">Analyse IA - Semaine en cours</strong><br><br>
  Ta charge cette semaine est en phase d'affutage, ce qui est parfaitement logique a J-3 du marathon. Le volume a baisse progressivement depuis le pic a 75 km il y a 4 semaines. Bonne gestion.<br><br>
  <strong>Points positifs :</strong> les allures de seuil se sont ameliorees de 4:41 a 4:25/km sur 12 semaines. La FC moyenne en EF a baisse de 138 a 132 bpm, signe d'une progression aerobique solide. La sortie longue de 32 km a 5:15 est un excellent indicateur pour un objectif a 3h15.<br><br>
  <strong>Attention :</strong> ta derniere seance de fractionne etait assez legere (3x400m), ce qui est normal en affutage. Evite tout effort intense d'ici dimanche. Hydratation et sommeil sont prioritaires maintenant.<br><br>
  <strong>Pronostic :</strong> sur la base de ta VMA estimee, de ta progression d'allures et de ta charge, un chrono entre <strong>3h12 et 3h18</strong> semble realiste. Vise les 4:35/km au depart et ajuste apres le semi.`;
}

function toggleTheme(){document.body.classList.toggle('light');localStorage.setItem('sp_theme',document.body.classList.contains('light')?'light':'dark')}
if(localStorage.getItem('sp_theme')==='light')document.body.classList.add('light');
</script>
</body>
</html>

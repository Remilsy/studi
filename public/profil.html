<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil - Station Performance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;overflow-x:hidden;transition:background .4s,color .4s;padding-bottom:80px}
body.light{background:#f5f5f2;color:#111}
a{text-decoration:none;color:inherit}

.theme-toggle{position:fixed;top:16px;right:20px;z-index:90;background:rgba(255,255,255,0.08);border:1px solid #333;color:#888;padding:8px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;transition:all .3s}
.theme-toggle:hover{border-color:#FC4C02;color:#FC4C02}
body.light .theme-toggle{background:rgba(0,0,0,0.05);border-color:#ccc;color:#666}

.glow{position:fixed;width:300px;height:300px;background:#FC4C02;filter:blur(150px);opacity:0.1;border-radius:50%;pointer-events:none;z-index:0}
.glow-1{top:10%;right:20%}

.container{max-width:900px;margin:0 auto;padding:60px 20px;position:relative;z-index:1}
.back-link{font-size:12px;color:#888;margin-bottom:16px;display:inline-block;transition:color .2s}
.back-link:hover{color:#FC4C02}
.page-title{font-size:36px;font-weight:900;letter-spacing:-2px;margin-bottom:4px}
.page-sub{font-size:13px;color:#888;margin-bottom:32px}

.card{background:#161616;border:1px solid #333;border-radius:30px;padding:32px;margin-bottom:16px;transition:all .3s}
.card:hover{border-color:#444}
body.light .card{background:#fff;border-color:#e0e0e0}
.card-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#888;margin-bottom:20px}

.field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.field{position:relative}
.field-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.field-val{font-size:20px;font-weight:900;letter-spacing:-1px;cursor:pointer;padding:6px 10px;border-radius:10px;transition:background .2s;min-height:36px;display:flex;align-items:center}
.field-val:hover{background:rgba(252,76,2,0.08)}
.field-val input{background:transparent;border:none;color:inherit;font:inherit;font-size:20px;font-weight:900;letter-spacing:-1px;width:100%;outline:none}
.field-unit{font-size:12px;color:#888;font-weight:400;margin-left:4px}

.zone-bar{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.zone-label{font-size:11px;width:30px;font-weight:700;flex-shrink:0}
.zone-track{flex:1;height:10px;background:#222;border-radius:5px;overflow:hidden;position:relative}
body.light .zone-track{background:#e8e8e5}
.zone-fill{height:100%;border-radius:5px;transition:width .8s ease}
.zone-range{font-size:10px;color:#888;width:90px;text-align:right;flex-shrink:0}

.records-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.record{text-align:center;background:#222;border-radius:16px;padding:20px 12px;transition:all .3s}
.record:hover{background:#2a2a2a;transform:translateY(-4px)}
body.light .record{background:#f0f0ed}
body.light .record:hover{background:#e8e8e5}
.record-dist{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.record-time{font-size:22px;font-weight:900;letter-spacing:-1px}

.pace-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.pace-item{background:#222;border-radius:16px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
body.light .pace-item{background:#f0f0ed}
.pace-name{font-size:12px;color:#888}
.pace-val{font-size:18px;font-weight:900;letter-spacing:-1px}

.objective{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.obj-main{flex:1}
.obj-race{font-size:20px;font-weight:900;letter-spacing:-1px}
.obj-date{font-size:13px;color:#888;margin-top:4px}
.obj-chrono{font-size:48px;font-weight:900;letter-spacing:-3px;color:#FC4C02}
.countdown{margin-top:8px;font-size:13px;color:#888}

.gauge-container{display:flex;justify-content:center;padding:20px 0}
.gauge{position:relative;width:160px;height:160px}
.gauge svg{transform:rotate(-90deg)}
.gauge-bg{fill:none;stroke:#222;stroke-width:10}
body.light .gauge-bg{stroke:#e0e0e0}
.gauge-fill{fill:none;stroke:#FC4C02;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.5s ease}
.gauge-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-val{font-size:36px;font-weight:900;letter-spacing:-2px}
.gauge-lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1px}

.season-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.season-stat{text-align:center}
.season-val{font-size:28px;font-weight:900;letter-spacing:-1px}
.season-lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-top:4px}

.ai-btn{display:block;width:100%;margin-top:24px;padding:16px;border-radius:20px;border:1px solid #FC4C02;background:transparent;color:#FC4C02;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .3s;letter-spacing:.5px}
.ai-btn:hover{background:#FC4C02;color:#fff}
.ai-result{margin-top:16px;background:#161616;border:1px solid #333;border-radius:20px;padding:24px;font-size:13px;line-height:1.7;color:#ccc;display:none}
body.light .ai-result{background:#fff;border-color:#e0e0e0;color:#444}
.ai-result.show{display:block;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.mobile-nav{position:fixed;bottom:0;left:0;right:0;z-index:90;background:#111;border-top:1px solid #222;padding:8px 0 env(safe-area-inset-bottom,8px)}
body.light .mobile-nav{background:#fff;border-color:#e0e0e0}
.mobile-nav-inner{display:flex;justify-content:space-around;max-width:400px;margin:0 auto}
.mob-link{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:#888;padding:6px 12px;border-radius:12px;transition:color .2s}
.mob-link.active,.mob-link:hover{color:#FC4C02}
.mob-icon{font-size:18px}

@media(max-width:600px){
  .records-grid{grid-template-columns:repeat(2,1fr)}
  .pace-grid{grid-template-columns:1fr}
  .season-stats{grid-template-columns:1fr}
  .objective{flex-direction:column;text-align:center}
}
</style>
</head>
<body>
<div class="glow glow-1"></div>
<button class="theme-toggle" onclick="toggleTheme()">&#9728;&#65039; Theme</button>

<div class="container">
  <a href="index.html" class="back-link">&larr; Accueil</a>
  <h1 class="page-title">Profil</h1>
  <p class="page-sub">Carte d'identite athlete</p>

  <!-- Identite -->
  <div class="card">
    <div class="card-title">Identite</div>
    <div class="field-grid" id="identityFields"></div>
  </div>

  <!-- Zones FC -->
  <div class="card">
    <div class="card-title">Zones de frequence cardiaque</div>
    <div id="fcZones"></div>
  </div>

  <!-- Zones allure -->
  <div class="card">
    <div class="card-title">Zones d'allure</div>
    <div id="paceZones"></div>
  </div>

  <!-- Records -->
  <div class="card">
    <div class="card-title">Records personnels</div>
    <div class="records-grid" id="records"></div>
  </div>

  <!-- Allures cibles -->
  <div class="card">
    <div class="card-title">Allures cibles</div>
    <div class="pace-grid" id="targetPaces"></div>
  </div>

  <!-- Objectif -->
  <div class="card">
    <div class="card-title">Objectif</div>
    <div class="objective" id="objective"></div>
  </div>

  <!-- Jauge de forme -->
  <div class="card">
    <div class="card-title">Indice de forme</div>
    <div class="gauge-container">
      <div class="gauge">
        <svg width="160" height="160" viewBox="0 0 160 160">
          <circle class="gauge-bg" cx="80" cy="80" r="70"/>
          <circle class="gauge-fill" id="gaugeFill" cx="80" cy="80" r="70" stroke-dasharray="440" stroke-dashoffset="440"/>
        </svg>
        <div class="gauge-text">
          <div class="gauge-val" id="gaugeVal">0</div>
          <div class="gauge-lbl">forme</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Stats saison -->
  <div class="card">
    <div class="card-title">Saison 2026</div>
    <div class="season-stats" id="seasonStats"></div>
  </div>

  <button class="ai-btn" onclick="showAnalysis()">&#129302; Analyse IA du profil</button>
  <div class="ai-result" id="aiResult"></div>
</div>

<nav class="mobile-nav">
  <div class="mobile-nav-inner">
    <a href="index.html" class="mob-link"><span class="mob-icon">&#127968;</span><span class="mob-label">Accueil</span></a>
    <a href="dashboard.html" class="mob-link"><span class="mob-icon">&#128200;</span><span class="mob-label">Dashboard</span></a>
    <a href="profil.html" class="mob-link active"><span class="mob-icon">&#128100;</span><span class="mob-label">Profil</span></a>
  </div>
</nav>

<script>
// Profile data (editable, saved to localStorage)
const DEFAULTS={
  nom:'Remi Lusley',age:'26',poids:'80',taille:'187',fcMax:'204',fcRepos:'48',vma:'18.5'
};
let profile={};
try{profile=JSON.parse(localStorage.getItem('sp_profile')||'{}');}catch(e){}
function pv(key){return profile[key]||DEFAULTS[key]}
function saveProfile(){localStorage.setItem('sp_profile',JSON.stringify(profile))}

// Identity fields
const fields=[
  {key:'nom',label:'Nom',unit:''},
  {key:'age',label:'Age',unit:'ans'},
  {key:'poids',label:'Poids',unit:'kg'},
  {key:'taille',label:'Taille',unit:'cm'},
  {key:'fcMax',label:'FC Max',unit:'bpm'},
  {key:'fcRepos',label:'FC Repos',unit:'bpm'},
  {key:'vma',label:'VMA',unit:'km/h'},
];
const idEl=document.getElementById('identityFields');
fields.forEach(f=>{
  const div=document.createElement('div');div.className='field';
  div.innerHTML=`<div class="field-label">${f.label}</div><div class="field-val" onclick="editField(this,'${f.key}')">${pv(f.key)}<span class="field-unit">${f.unit}</span></div>`;
  idEl.appendChild(div);
});

function editField(el,key){
  const current=pv(key);
  el.innerHTML=`<input type="text" value="${current}" onblur="saveField(this,'${key}')" onkeydown="if(event.key==='Enter')this.blur()">`;
  el.querySelector('input').focus();
}
function saveField(input,key){
  profile[key]=input.value;saveProfile();
  const f=fields.find(x=>x.key===key);
  input.parentElement.innerHTML=`${input.value}<span class="field-unit">${f?f.unit:''}</span>`;
  input.parentElement.onclick=function(){editField(this,key)};
}

// FC Zones
const fcMax=parseInt(pv('fcMax'));
const zones=[
  {z:'Z1',name:'Recuperation',min:Math.round(fcMax*0.5),max:Math.round(fcMax*0.6),color:'#22c55e',pct:20},
  {z:'Z2',name:'Endurance',min:Math.round(fcMax*0.6),max:Math.round(fcMax*0.7),color:'#3b82f6',pct:35},
  {z:'Z3',name:'Tempo',min:Math.round(fcMax*0.7),max:Math.round(fcMax*0.8),color:'#eab308',pct:25},
  {z:'Z4',name:'Seuil',min:Math.round(fcMax*0.8),max:Math.round(fcMax*0.9),color:'#f97316',pct:15},
  {z:'Z5',name:'VO2max',min:Math.round(fcMax*0.9),max:fcMax,color:'#ef4444',pct:5},
];
const fcEl=document.getElementById('fcZones');
zones.forEach(z=>{
  fcEl.innerHTML+=`<div class="zone-bar"><span class="zone-label" style="color:${z.color}">${z.z}</span><div class="zone-track"><div class="zone-fill" style="width:${z.pct*2}%;background:${z.color}"></div></div><span class="zone-range">${z.min}-${z.max} bpm</span></div>`;
});

// Pace zones
const paceZones=[
  {z:'Z1',name:'Recuperation',range:'6:00 - 6:30',color:'#22c55e',pct:15},
  {z:'Z2',name:'Endurance fondamentale',range:'5:20 - 5:50',color:'#3b82f6',pct:30},
  {z:'Z3',name:'Allure marathon',range:'4:30 - 4:40',color:'#eab308',pct:25},
  {z:'Z4',name:'Seuil',range:'4:15 - 4:30',color:'#f97316',pct:20},
  {z:'Z5',name:'VMA',range:'3:45 - 4:00',color:'#ef4444',pct:10},
];
const pzEl=document.getElementById('paceZones');
paceZones.forEach(z=>{
  pzEl.innerHTML+=`<div class="zone-bar"><span class="zone-label" style="color:${z.color}">${z.z}</span><div class="zone-track"><div class="zone-fill" style="width:${z.pct*2.5}%;background:${z.color}"></div></div><span class="zone-range">${z.range}/km</span></div>`;
});

// Records
const records=[
  {dist:'5 km',time:'19:52'},{dist:'10 km',time:'41:30'},{dist:'Semi',time:'1:32:15'},{dist:'Marathon',time:'3:21:44'}
];
const recEl=document.getElementById('records');
records.forEach(r=>{recEl.innerHTML+=`<div class="record"><div class="record-dist">${r.dist}</div><div class="record-time">${r.time}</div></div>`});

// Target paces
const paces=[
  {name:'Endurance fondamentale',val:'5:30/km'},{name:'Seuil',val:'4:22/km'},
  {name:'Allure marathon',val:'4:37/km'},{name:'Allure semi',val:'4:22/km'},
];
const tpEl=document.getElementById('targetPaces');
paces.forEach(p=>{tpEl.innerHTML+=`<div class="pace-item"><span class="pace-name">${p.name}</span><span class="pace-val">${p.val}</span></div>`});

// Objective
const raceDate=new Date('2026-06-28');
const today=new Date('2026-06-25');
const diff=Math.ceil((raceDate-today)/(1000*60*60*24));
document.getElementById('objective').innerHTML=`
  <div class="obj-main"><div class="obj-race">Marathon de Paris</div><div class="obj-date">Dimanche 28 juin 2026</div><div class="countdown">J-${diff}</div></div>
  <div><div class="obj-chrono">3:15:00</div><div style="font-size:11px;color:#888;text-align:center;margin-top:4px">OBJECTIF</div></div>`;

// Gauge
const formScore=82;
const circumference=2*Math.PI*70;
const offset=circumference-(formScore/100)*circumference;
setTimeout(()=>{
  document.getElementById('gaugeFill').style.strokeDashoffset=offset;
  document.getElementById('gaugeVal').textContent=formScore;
},300);

// Season stats
const SESSIONS=[{date:'2026-03-31',distance:10.2,elev:45},{date:'2026-04-01',distance:9.8,elev:30},{date:'2026-04-03',distance:12.1,elev:55},{date:'2026-04-05',distance:8.0,elev:25},{date:'2026-04-06',distance:22.0,elev:180},{date:'2026-04-07',distance:10.5,elev:50},{date:'2026-04-08',distance:11.2,elev:35},{date:'2026-04-10',distance:11.8,elev:60},{date:'2026-04-12',distance:9.5,elev:120},{date:'2026-04-13',distance:24.0,elev:210},{date:'2026-04-14',distance:10.0,elev:40},{date:'2026-04-15',distance:10.5,elev:25},{date:'2026-04-17',distance:14.0,elev:70},{date:'2026-04-19',distance:8.5,elev:30},{date:'2026-04-20',distance:26.0,elev:230},{date:'2026-04-21',distance:8.0,elev:25},{date:'2026-04-22',distance:8.0,elev:15},{date:'2026-04-24',distance:9.0,elev:35},{date:'2026-04-26',distance:18.0,elev:130},{date:'2026-04-28',distance:10.0,elev:45},{date:'2026-04-29',distance:10.2,elev:20},{date:'2026-05-01',distance:12.5,elev:55},{date:'2026-05-03',distance:9.0,elev:140},{date:'2026-05-04',distance:28.0,elev:260},{date:'2026-05-05',distance:10.0,elev:40},{date:'2026-05-06',distance:10.8,elev:25},{date:'2026-05-08',distance:15.0,elev:65},{date:'2026-05-09',distance:7.5,elev:20},{date:'2026-05-10',distance:30.0,elev:280},{date:'2026-05-12',distance:10.5,elev:50},{date:'2026-05-13',distance:11.5,elev:30},{date:'2026-05-15',distance:13.0,elev:60},{date:'2026-05-16',distance:8.0,elev:30},{date:'2026-05-17',distance:32.0,elev:300},{date:'2026-05-19',distance:8.0,elev:25},{date:'2026-05-20',distance:7.5,elev:10},{date:'2026-05-22',distance:9.0,elev:35},{date:'2026-05-24',distance:20.0,elev:150},{date:'2026-05-26',distance:10.0,elev:45},{date:'2026-05-27',distance:10.5,elev:20},{date:'2026-05-29',distance:14.0,elev:65},{date:'2026-05-30',distance:8.0,elev:25},{date:'2026-05-31',distance:30.0,elev:270},{date:'2026-06-02',distance:10.0,elev:45},{date:'2026-06-03',distance:11.0,elev:30},{date:'2026-06-05',distance:16.0,elev:70},{date:'2026-06-06',distance:8.5,elev:30},{date:'2026-06-07',distance:28.0,elev:250},{date:'2026-06-09',distance:10.0,elev:40},{date:'2026-06-10',distance:10.0,elev:25},{date:'2026-06-12',distance:12.0,elev:50},{date:'2026-06-13',distance:7.0,elev:20},{date:'2026-06-14',distance:24.0,elev:200},{date:'2026-06-16',distance:9.0,elev:35},{date:'2026-06-17',distance:9.0,elev:20},{date:'2026-06-19',distance:10.0,elev:40},{date:'2026-06-20',distance:7.0,elev:20},{date:'2026-06-21',distance:18.0,elev:130},{date:'2026-06-23',distance:14.0,elev:55},{date:'2026-06-24',distance:10.0,elev:30},{date:'2026-06-25',distance:8.0,elev:80},{date:'2026-06-27',distance:8.0,elev:35}];

const totalKm=SESSIONS.reduce((s,a)=>s+a.distance,0);
const totalElev=SESSIONS.reduce((s,a)=>s+a.elev,0);
document.getElementById('seasonStats').innerHTML=`
  <div class="season-stat"><div class="season-val">${Math.round(totalKm)}</div><div class="season-lbl">km parcourus</div></div>
  <div class="season-stat"><div class="season-val">${totalElev.toLocaleString()}</div><div class="season-lbl">m denivele</div></div>
  <div class="season-stat"><div class="season-val">${SESSIONS.length}</div><div class="season-lbl">seances</div></div>`;

function showAnalysis(){
  const el=document.getElementById('aiResult');
  el.classList.add('show');
  el.innerHTML=`<strong style="color:#FC4C02">Analyse IA du profil</strong><br><br>
  Remi, ton profil est celui d'un coureur en nette progression. Avec une VMA a 18.5 km/h et une FC repos a 48 bpm, ta base aerobique est solide.<br><br>
  <strong>Records :</strong> ton record semi (1h32) est coherent avec un objectif marathon a 3h15. La regle du "semi x2 + 10min" donne 3h14, ce qui confirme que l'objectif est ambitieux mais realiste.<br><br>
  <strong>Zones :</strong> tes zones FC sont bien calibrees. En course, vise Z2-Z3 sur les 30 premiers km, puis laisse monter en Z4 sur le finish. Ne depasse jamais Z4 avant le km 32.<br><br>
  <strong>Poids de forme :</strong> a 80 kg pour 1m87, ton IMC est de 22.9, dans la fourchette ideale pour un marathonien amateur de ton gabarit. Chaque kilo en moins, c'est environ 3 secondes au km. Mais ne force pas la perte de poids a J-3.<br><br>
  <strong>Indice de forme (82/100) :</strong> excellent. La charge a ete bien dosee, l'affutage est en cours. Tu arrives frais le jour J.`;
}

function toggleTheme(){document.body.classList.toggle('light');localStorage.setItem('sp_theme',document.body.classList.contains('light')?'light':'dark')}
if(localStorage.getItem('sp_theme')==='light')document.body.classList.add('light');
</script>
</body>
</html>
